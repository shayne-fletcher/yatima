name: build and test
on:
  push:
  pull_request:
env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"   # HTTP/1.1; sidesteps the crates.io HTTP/2 framing flake
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: SebRollen/toml-action@v1.0.2
      id: read_rust_toolchain
      with:
        file: rust-toolchain
        field: toolchain.channel
    - uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ steps.read_rust_toolchain.outputs.value }}
        components: clippy, rustfmt
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: shared-build-cache
        cache-targets: true
        cache-all-crates: true
    - name: format check
      run: cargo fmt --all --check
    - name: clippy check
      run: cargo clippy --all-targets
    - name: build
      run: cargo build
    - name: wasm check (WASM-1)
      run: ./scripts/check-wasm.sh
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - uses: SebRollen/toml-action@v1.0.2
      id: read_rust_toolchain
      with:
        file: rust-toolchain
        field: toolchain.channel
    - uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ steps.read_rust_toolchain.outputs.value }}
        components: clippy, rustfmt
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: shared-build-cache
        cache-targets: true
        cache-all-crates: true
    - name: run tests
      run: cargo test
  publish-docs:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/checkout@v4
    - uses: SebRollen/toml-action@v1.0.2
      id: read_rust_toolchain
      with:
        file: rust-toolchain
        field: toolchain.channel
    - uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ steps.read_rust_toolchain.outputs.value }}
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: shared-build-cache
        cache-targets: true
        cache-all-crates: true
    - uses: actions/configure-pages@v5
      with:
        enablement: true
    - name: build docs
      run: cargo doc --workspace --no-deps
    - name: disable jekyll
      run: touch target/doc/.nojekyll
    - name: copy logo
      run: cp images/logo.png target/doc/logo.png
    - name: create workspace index
      run: |
        cat > target/doc/index.html <<'EOF'
        <!DOCTYPE html>
        <html lang="en">
        <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>yatima — documentation</title>
          <style>
            body { padding: 2rem; max-width: 820px; margin: 0 auto;
                   font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Helvetica, Arial, sans-serif; color: #1f2328; }
            .hero { text-align: center; margin-bottom: 2.5rem; }
            .hero img { width: 240px; height: auto; border-radius: 8px; }
            .hero h1 { margin: 1rem 0 0.25rem; }
            .hero p { color: #57606a; margin: 0; }
            .gh { display: inline-flex; align-items: center; gap: 0.5rem;
                  padding: 0.5rem 1rem; background: #24292e; color: #fff;
                  text-decoration: none; border-radius: 6px; margin-top: 1rem; }
            ul.crates { list-style: none; padding: 0; }
            ul.crates li { margin: 1rem 0; padding: 1rem; border: 1px solid #d0d7de;
                           border-radius: 6px; }
            ul.crates h2 { margin: 0 0 0.25rem; font-size: 1.1rem; }
            a { color: #0969da; text-decoration: none; }
            a:hover { text-decoration: underline; }
            footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #d0d7de;
                     color: #57606a; font-size: 0.875rem; text-align: center; }
          </style>
        </head>
        <body>
          <div class="hero">
            <img src="logo.png" alt="yatima logo">
            <h1>yatima</h1>
            <p>language-integrated llms</p>
            <a class="gh" href="https://github.com/shayne-fletcher/yatima">View on GitHub</a>
          </div>
          <h2>Crates</h2>
          <ul class="crates">
            <li>
              <h2><a href="yatima_lib/index.html">yatima-lib</a></h2>
              <p>the runtime — inference as an in-process library function.</p>
            </li>
            <li>
              <h2><a href="yatima/index.html">yatima-cli</a></h2>
              <p>the <code>yatima</code> command-line front-end (binary crate
              <code>yatima</code>).</p>
            </li>
          </ul>
          <footer>
            Copyright © 2026 Shayne Fletcher. Licensed under
            <a href="https://github.com/shayne-fletcher/yatima/blob/main/LICENSE">BSD-3-Clause</a>.
          </footer>
        </body>
        </html>
        EOF
    - name: upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: target/doc
    - name: deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
